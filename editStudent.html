<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <nav id="navigation">
        <a href="dashboard.html">Dashboard</a>
        <a href="addstudent.html">Add Student</a>
        <a href="viewstudent.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>

    <form id="editStudentForm">

        <h1>Edit Student</h1>

        <label for="name">Enter Name</label>
        <input type="text" id="name" required>

        <label for="rollno">Enter Roll Number</label>
        <input type="text" id="rollno" required>

        <label for="branch">Enter Branch</label>
        <input type="text" id="branch" required>

        <label for="cgpa">Enter CGPA</label>
        <input type="number" id="cgpa" step="0.01" required>

        <button type="submit">Save Changes</button>

    </form>

    <script src="script.js"></script>

</body>
</html>
